# Copia este archivo como secrets.toml para pruebas locales.
# En Streamlit Community Cloud pega solo una de estas opciones en App settings > Secrets.

# Opcion recomendada si cada usuario accede con su cuenta institucional.
[auth]
redirect_uri = "https://tu-app.streamlit.app/oauth2callback"
cookie_secret = "genera-un-secreto-largo-y-aleatorio"
client_id = "tu-web-client-id.apps.googleusercontent.com"
client_secret = "tu-web-client-secret"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"
expose_tokens = "access"
client_kwargs = { "scope" = "openid email profile https://www.googleapis.com/auth/spreadsheets", "prompt" = "select_account" }

# Para pruebas locales, usa este redirect_uri y registralo tambien en Google Cloud:
# redirect_uri = "http://localhost:8501/oauth2callback"

# Opcion alternativa si tu organizacion permite compartir el Sheet con una service account.
# No actives ambas opciones al mismo tiempo: la app prioriza [gcp_service_account].
